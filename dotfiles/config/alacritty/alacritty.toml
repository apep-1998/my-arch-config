# Alacritty configuration
# Colors match the Tomorrow Night palette used in polybar

[window]
padding = { x = 8, y = 6 }
decorations = "none"
opacity = 1.0
startup_mode = "Windowed"
dynamic_title = true

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold   = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size   = 12.0
offset = { x = 0, y = 1 }

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#282a2e"
foreground = "#c5c8c6"

[colors.cursor]
text   = "#1d1f21"
cursor = "#f0c674"

[colors.selection]
text       = "CellForeground"
background = "#373b41"

# Tomorrow Night normal colors
[colors.normal]
black   = "#1d1f21"
red     = "#cc6666"
green   = "#b5bd68"
yellow  = "#f0c674"
blue    = "#81a2be"
magenta = "#b294bb"
cyan    = "#8abeb7"
white   = "#c5c8c6"

# Tomorrow Night bright colors
[colors.bright]
black   = "#666666"
red     = "#d54e53"
green   = "#b9ca4a"
yellow  = "#e7c547"
blue    = "#7aa6da"
magenta = "#c397d8"
cyan    = "#70c0b1"
white   = "#eaeaea"

[cursor]
style    = { shape = "Block", blinking = "Off" }
vi_mode_style = { shape = "Underline" }

[terminal]
shell = { program = "/bin/zsh" }

[keyboard]
bindings = [
  # copy / paste
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },
  # font size
  { key = "Plus",  mods = "Control", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
  { key = "Key0",  mods = "Control", action = "ResetFontSize" },
]
